<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="CriptoBro — Trackea criptomonedas con datos en tiempo real de CoinGecko, autenticación con Supabase y favoritos personalizados."
    />
    <meta name="theme-color" content="#0c0c0c" />

    <title>CriptoBro</title>

    <!-- Fonts: Work Sans (UI) + JetBrains Mono (datos) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Anti-FOUC theme script (lee localStorage antes de que React monte) -->
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia("(prefers-color-scheme: light)").matches
            ? "light"
            : "dark";
        }
        document.documentElement.setAttribute("data-theme", t);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
